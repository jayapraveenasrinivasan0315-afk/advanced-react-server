apiVersion: app/v1
kind: deployment
metadata:
  name: advanced-react-server
  labels:
    app: advanced-react-server
spec:
  replicas: 2
  selector:
    matchlables:
      app: advanced-react-server
  template:
    metadata:
      labels:
        app: advanced-react-server
    spec:
      containers:
        - name: advanced-react-server
          image: <your-dockerhub-username>/advanced-react-server:latest
          ports:
            - containerPort: 3000